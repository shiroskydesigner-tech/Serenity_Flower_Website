<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type · bilingual pairing</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 28px 36px; gap: 20px; }
  .stack { display: flex; flex-direction: column; gap: 4px; }
  .eyebrow { font-family: var(--font-body-en); font-size: 10px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: var(--bark); }
  .en { font-family: var(--font-display-en); font-weight: 400; font-size: 44px; line-height: 1.05; letter-spacing: -0.01em; color: var(--ink); }
  .rule { width: 44px; height: 2px; background: var(--bark); margin: 8px 0 6px; }
  .tc { font-family: var(--font-display-tc); font-weight: 500; font-size: 34px; letter-spacing: 0.06em; line-height: 1.2; color: var(--ink); }
  .row { display: flex; gap: 56px; align-items: flex-start; }
  .note { font-family: var(--font-body-en); font-size: 12px; color: var(--ink-70); max-width: 260px; line-height: 1.6; }
</style>
</head>
<body>
  <div class="card">
    <span class="eyebrow">Bilingual lockup</span>
    <div class="row">
      <div class="stack">
        <div class="en">Stillness, restructured.</div>
        <div class="rule"></div>
        <div class="tc">靜謐，重構。</div>
      </div>
      <p class="note">English sits above, lighter in weight. Chinese sits below, heavier by one step so optical density aligns. A 2px bark rule marks the script change.</p>
    </div>
  </div>
</body>
</html>
