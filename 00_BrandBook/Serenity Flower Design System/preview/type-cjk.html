<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type · CJK</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 22px 32px; gap: 10px; }
  .meta { display: flex; gap: 14px; align-items: baseline; }
  .eyebrow { font-family: var(--font-body-en); font-size: 10px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: var(--bark); }
  .stack { font-family: ui-monospace, Menlo, monospace; font-size: 10px; color: var(--ink-70); }
  .specimen { font-family: var(--font-display-tc); font-weight: 400; font-size: 56px; line-height: 1.15; letter-spacing: 0.08em; color: var(--ink); }
  .body { font-family: var(--font-body-tc); font-weight: 400; font-size: 15px; line-height: 1.95; color: var(--ink-70); max-width: 580px; }
</style>
</head>
<body>
  <div class="card">
    <div class="meta"><span class="eyebrow">CJK · Traditional</span><span class="stack">Noto Serif TC / Noto Sans TC</span></div>
    <div class="specimen">靜謐花間</div>
    <p class="body">繁體中文設定為 Noto Serif TC 標題、Noto Sans TC 內文。中文行高放寬至 1.85–1.95，字距控制在 0.05–0.08em 之間，使其與英文字級在視覺密度上達成對齊。</p>
  </div>
</body>
</html>
