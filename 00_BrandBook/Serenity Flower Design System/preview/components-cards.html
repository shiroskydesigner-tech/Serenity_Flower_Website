<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Components · cards</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 26px 28px; gap: 16px; }
  .eyebrow { font-family: var(--font-body-en); font-size: 10px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: var(--bark); }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .c { background: var(--white); border: 1px solid var(--ink-10); padding: 18px; display: flex; flex-direction: column; gap: 10px; }
  .c .num { font-family: var(--font-display-en); font-size: 36px; font-weight: 300; line-height: 1; color: var(--ink); }
  .c .ttl { font-family: var(--font-display-en); font-size: 18px; font-weight: 400; line-height: 1.2; color: var(--ink); }
  .c .tc { font-family: var(--font-display-tc); font-size: 14px; color: var(--bark); letter-spacing: 0.05em; }
  .c .desc { font-family: var(--font-body-en); font-size: 11px; line-height: 1.6; color: var(--ink-70); }
  .c .rule { width: 24px; height: 2px; background: var(--bark); margin-top: 4px; }
  .c.image { padding: 0; aspect-ratio: 1 / 0.95; position: relative; background: var(--linen); overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .c.image .caption { position: absolute; bottom: 12px; left: 14px; right: 14px; font-family: var(--font-body-en); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink); }
  .c.image svg { width: 100%; height: 100%; display: block; }
</style>
</head>
<body>
  <div class="card">
    <span class="eyebrow">Card patterns</span>
    <div class="row">
      <div class="c">
        <span class="num">01</span>
        <div class="ttl">Installation Art</div>
        <div class="tc">裝置藝術</div>
        <div class="rule"></div>
        <div class="desc">Sculptural objects and spatial interventions.</div>
      </div>
      <div class="c">
        <span class="num">02</span>
        <div class="ttl">Wedding Design</div>
        <div class="tc">婚禮佈置</div>
        <div class="rule"></div>
        <div class="desc">Architectural choreography of an event space.</div>
      </div>
      <div class="c">
        <span class="num">03</span>
        <div class="ttl">Seasonal Florals</div>
        <div class="tc">節慶花禮</div>
        <div class="rule"></div>
        <div class="desc">Plant material reduced to its purest line and silhouette.</div>
      </div>
    </div>
  </div>
</body>
</html>
