<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Logo · clearspace + sizing</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 32px 40px; gap: 20px; flex-direction: row; align-items: center; }
  .construction { position: relative; }
  .construction svg { display: block; }
  .right { display: flex; flex-direction: column; gap: 12px; max-width: 280px; }
  h4 { font-family: var(--font-body-en); font-size: 11px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: var(--bark); margin: 0; }
  ul { font-family: var(--font-body-en); font-size: 12px; color: var(--ink-70); line-height: 1.65; margin: 0; padding-left: 14px; }
  ul li::marker { color: var(--bark); }
</style>
</head>
<body>
  <div class="card">
    <div class="construction">
      <svg viewBox="0 0 360 200" width="360" height="200" xmlns="http://www.w3.org/2000/svg">
        <!-- dotted clearspace box -->
        <rect x="20" y="20" width="320" height="160" fill="none" stroke="#89583A" stroke-width="1" stroke-dasharray="3 4" opacity="0.55"/>
        <!-- inner mark area -->
        <rect x="60" y="60" width="240" height="80" fill="none" stroke="#89583A" stroke-width="0.75" stroke-dasharray="2 3" opacity="0.4"/>
        <!-- wordmark sample -->
        <text x="180" y="105"
              font-family="Bell, 'Bell MT', 'Cormorant Garamond', 'Times New Roman', serif"
              font-size="22" font-weight="400" letter-spacing="6"
              text-anchor="middle" fill="#3E2D21">SERENITY FLOWER</text>
        <rect x="160" y="112" width="40" height="2" fill="#89583A"/>
        <text x="180" y="134"
              font-family="'Noto Serif TC', serif"
              font-size="14" font-weight="500" letter-spacing="4"
              text-anchor="middle" fill="#3E2D21">靜謐花間</text>
        <!-- corner ticks for clearspace -->
        <g stroke="#89583A" stroke-width="1" fill="none">
          <path d="M20 32 L20 20 L32 20"/>
          <path d="M340 32 L340 20 L328 20"/>
          <path d="M20 168 L20 180 L32 180"/>
          <path d="M340 168 L340 180 L328 180"/>
        </g>
        <!-- x measurement -->
        <text x="40" y="14" font-family="ui-monospace, Menlo, monospace" font-size="9" fill="#89583A">clearspace = cap-height × 1.5</text>
      </svg>
    </div>
    <div class="right">
      <h4>Clearspace + Min Size</h4>
      <ul>
        <li>Clearspace = wordmark cap-height × 1.5 on all sides</li>
        <li>Min digital size: 120 px wide</li>
        <li>Min print size: 26 mm wide</li>
        <li>Never crop, never tint, never recolor on a saturated background</li>
      </ul>
    </div>
  </div>
</body>
</html>
