<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Wordmark · primary</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 28px 40px; gap: 0; justify-content: center; align-items: center; background: #D8BE99; }
  body { background: #D8BE99; }
  .frame { display: flex; gap: 56px; align-items: center; }
  .lockup {
    background: #EEE5D6;
    padding: 24px 36px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--ink-10);
  }
  .lockup img { display: block; height: 220px; width: auto; }
  .meta { display: flex; flex-direction: column; gap: 14px; max-width: 260px; }
  .meta h4 { font-family: var(--font-body-en); font-size: 11px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: var(--bark); margin: 0; }
  .meta p { font-family: var(--font-body-en); font-size: 13px; color: var(--ink-70); line-height: 1.55; margin: 0; max-width: none; }
</style>
</head>
<body>
  <div class="card">
    <div class="frame">
      <div class="lockup"><img src="../assets/logo-primary.png" alt="Serenity Flower · Floral Designs · 靜謐花間"></div>
      <div class="meta">
        <h4>Primary Logo · Brand</h4>
        <p>Canonical oval lockup — line-drawn tulip, <strong style="color:var(--ink); font-weight:500">FLORAL · DESIGNS</strong>, <strong style="color:var(--ink); font-weight:500">Serenity – Flower –</strong>, and <strong style="color:var(--ink); font-weight:500">靜謐花間</strong>. Use on the main brand color (Linen).</p>
        <div style="display:flex; flex-direction:column; gap:6px; font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: var(--ink-70); margin-top: 4px;">
          <div style="display:flex; align-items:center; gap:8px;"><span style="display:inline-block; width:14px; height:14px; background:#D8BE99; border:1px solid var(--ink-20);"></span><span style="color:var(--ink); font-weight:500">#D8BE99</span> · main</div>
          <div style="display:flex; align-items:center; gap:8px;"><span style="display:inline-block; width:14px; height:14px; background:#EEE5D6; border:1px solid var(--ink-20);"></span><span style="color:var(--ink); font-weight:500">#EEE5D6</span> · secondary (cream)</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
