<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing scale</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 22px 32px; gap: 8px; }
  .eyebrow { font-family: var(--font-body-en); font-size: 10px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: var(--bark); }
  .scale { display: flex; flex-direction: column; gap: 6px; }
  .row { display: grid; grid-template-columns: 60px 1fr 60px; align-items: center; gap: 16px; padding: 4px 0; }
  .row .tag { font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: var(--ink); }
  .row .bar { height: 12px; background: var(--ink); }
  .row .px { font-family: ui-monospace, Menlo, monospace; font-size: 10px; color: var(--ink-70); text-align: right; }
</style>
</head>
<body>
  <div class="card">
    <span class="eyebrow">Spacing · 4-px base</span>
    <div class="scale">
      <div class="row"><span class="tag">s-1</span><div class="bar" style="width:4px"></div><span class="px">4 px</span></div>
      <div class="row"><span class="tag">s-2</span><div class="bar" style="width:8px"></div><span class="px">8 px</span></div>
      <div class="row"><span class="tag">s-3</span><div class="bar" style="width:12px"></div><span class="px">12 px</span></div>
      <div class="row"><span class="tag">s-4</span><div class="bar" style="width:16px"></div><span class="px">16 px</span></div>
      <div class="row"><span class="tag">s-5</span><div class="bar" style="width:24px"></div><span class="px">24 px</span></div>
      <div class="row"><span class="tag">s-6</span><div class="bar" style="width:32px"></div><span class="px">32 px</span></div>
      <div class="row"><span class="tag">s-7</span><div class="bar" style="width:48px"></div><span class="px">48 px</span></div>
      <div class="row"><span class="tag">s-8</span><div class="bar" style="width:64px"></div><span class="px">64 px</span></div>
      <div class="row"><span class="tag">s-9</span><div class="bar" style="width:96px"></div><span class="px">96 px</span></div>
      <div class="row"><span class="tag">s-10</span><div class="bar" style="width:128px"></div><span class="px">128 px</span></div>
    </div>
  </div>
</body>
</html>
