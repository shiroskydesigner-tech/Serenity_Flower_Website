<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type · display serif</title>
<link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 22px 32px; gap: 8px; justify-content: center; }
  .meta { display: flex; gap: 14px; align-items: baseline; }
  .eyebrow { font-family: var(--font-body-en); font-size: 10px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: var(--bark); }
  .stack { font-family: ui-monospace, Menlo, monospace; font-size: 10px; color: var(--ink-70); }
  .specimen { font-family: var(--font-display-en); font-weight: 400; font-size: 72px; line-height: 1.02; letter-spacing: -0.02em; color: var(--ink); }
  .specimen em { font-style: italic; }
  .row2 { display: flex; gap: 24px; align-items: baseline; }
  .row2 span { font-family: var(--font-display-en); }
  .w400 { font-weight: 400; }
  .wI   { font-weight: 400; font-style: italic; }
  .w700 { font-weight: 700; }
</style>
</head>
<body>
  <div class="card">
    <div class="meta"><span class="eyebrow">Display Serif · Brand</span><span class="stack">Bell (Bell MT) — uploaded TTF</span></div>
    <div class="specimen">Stillness, <em>restructured.</em></div>
    <div class="row2">
      <span class="w400" style="font-size:32px">Aa Regular</span>
      <span class="wI"   style="font-size:32px">Aa Italic</span>
      <span class="w700" style="font-size:32px">Aa Bold</span>
    </div>
  </div>
</body>
</html>
